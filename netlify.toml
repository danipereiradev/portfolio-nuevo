[[redirects]]
  from = "/landing-express"
  to = "/web-autonomos-pymes"
  status = 301
  force = true

[[redirects]]
  from = "/tienda-online"
  to = "/tiendas-online"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/sobre-el-estudio"
  status = 301
  force = true

[[redirects]]
  from = "/about-me"
  to = "/sobre-el-estudio"
  status = 301
  force = true

[[redirects]]
  from = "/sobre-mi"
  to = "/sobre-el-estudio"
  status = 301
  force = true

[[redirects]]
  from = "/contact"
  to = "/contacto"
  status = 301
  force = true

# Páginas de servicio eliminadas: solo quedan las 3 landings principales
# (web-autonomos-pymes, tiendas-online, mantenimiento-web). El resto
# redirige de forma permanente a la landing más afín.
[[redirects]]
  from = "/paginas-web-empresas"
  to = "/web-autonomos-pymes"
  status = 301
  force = true

[[redirects]]
  from = "/diseno-web"
  to = "/web-autonomos-pymes"
  status = 301
  force = true

[[redirects]]
  from = "/desarrollo-aplicaciones-web"
  to = "/web-autonomos-pymes"
  status = 301
  force = true

[[redirects]]
  from = "/posicionamiento-web-seo"
  to = "/web-autonomos-pymes"
  status = 301
  force = true

[[redirects]]
  from = "/auditoria-ecommerce"
  to = "/tiendas-online"
  status = 301
  force = true

# Cada ruta comercial sirve su propio index.html pre-renderizado (con
# title/description/canonical/OG/Twitter propios), generado por
# scripts/prerender-meta.mjs tras el build, en lugar de caer en el
# index.html genérico de la home.
[[redirects]]
  from = "/web-autonomos-pymes"
  to = "/web-autonomos-pymes/index.html"
  status = 200

[[redirects]]
  from = "/tiendas-online"
  to = "/tiendas-online/index.html"
  status = 200

[[redirects]]
  from = "/mantenimiento-web"
  to = "/mantenimiento-web/index.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to = "/contacto/index.html"
  status = 200

[[redirects]]
  from = "/sobre-el-estudio"
  to = "/sobre-el-estudio/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
