[[redirects]]
  from = "/landing-express"
  to = "/web-autonomos-pymes"
  status = 301
  force = true

[[redirects]]
  from = "/tienda-online"
  to = "/tiendas-online"
  status = 301
  force = true

# Cada ruta comercial sirve su propio index.html pre-renderizado (con
# title/description/canonical/OG/Twitter propios), generado por
# scripts/prerender-meta.mjs tras el build, en lugar de caer en el
# index.html genérico de la home.
[[redirects]]
  from = "/web-autonomos-pymes"
  to = "/web-autonomos-pymes/index.html"
  status = 200

